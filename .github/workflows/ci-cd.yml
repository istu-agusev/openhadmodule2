name: IoT Smart Greenhouse CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build edge_ai image
        run: docker build -t edge_ai ./edge_ai

      - name: Build sensor simulator image
        run: docker build -t sensor_simulator ./sensor_simulator


  unit_tests:
    name: Unit Tests (Edge AI)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest numpy paho-mqtt

      - name: Run unit tests
        run: pytest -q tests/unit


  integration_tests:
    name: Integration Tests (Docker Compose Stack)
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for system warm-up
        run: sleep 20

      - name: Run integration tests container
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml up --build --abort-on-container-exit --exit-code-from test_runner

      - name: Shutdown stack
        if: always()
        run: docker compose down -v


  deploy:
    name: Deploy (optional)
    runs-on: ubuntu-latest
    needs: integration_tests

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy message
        run: echo "Deploy stage placeholder (SSH / VPS / Kubernetes)"