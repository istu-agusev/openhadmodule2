services:
  mosquitto:
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 1883"]
      interval: 5s
      timeout: 3s
      retries: 10

  test_runner:
    build:
      context: .
      dockerfile: tests/Dockerfile

    depends_on:
      mosquitto:
        condition: service_healthy

    networks:
      - smart_home_net

    environment:
      - MQTT_HOST=mosquitto

    command: >
      sh -c "
        echo 'Waiting for MQTT...';
        until nc -z mosquitto 1883; do
          sleep 2;
        done;
        pytest -q tests/integration
      "
