services:
  mosquitto:
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',1883)); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 10

  test_runner:
    build:
      context: .
      dockerfile: tests/Dockerfile

    depends_on:
      mosquitto:
        condition: service_healthy

    networks:
      - smart_home_net

    environment:
      MQTT_HOST: mosquitto
      PYTHONPATH: /app

    command: >
      sh -c "echo 'Waiting for MQTT...'; 
      python -c \"import socket,time;
for _ in range(30):
    try:
        s=socket.create_connection(('mosquitto',1883),2);
        s.close();
        print('MQTT ready');
        break
    except:
        time.sleep(2)
else:
    raise SystemExit('MQTT not available')\"; 
      pytest -q tests/integration"
