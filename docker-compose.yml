services:

  openhab:
    image: openhab/openhab:latest
    container_name: openhabmodule2
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./openhab/conf:/openhab/conf
      - ./openhab/userdata:/openhab/userdata
      - ./openhab/addons:/openhab/addons

    environment:
      USER_ID: "1000"
      GROUP_ID: "1000"

    depends_on:
      - influxdb
      - mosquitto

    networks:
      - smart_home_net


 mosquitto:
  image: eclipse-mosquitto:2.0
  container_name: mosquittomodule2
  restart: unless-stopped

  ports:
    - "1883:1883"

  volumes:
    - ./mosquitto/config:/mosquitto/config
    - ./mosquitto/data:/mosquitto/data
    - ./mosquitto/log:/mosquitto/log

  networks:
    - smart_home_net


  edge_ai:
    build: ./edge_ai
    container_name: edge_aimodule2
    restart: unless-stopped
    depends_on:
      - mosquitto
    networks:
      - smart_home_net


  sensor_simulator:
    build: ./sensor_simulator
    container_name: sensor_simulatormodule2
    restart: unless-stopped
    depends_on:
      - mosquitto
    networks:
      - smart_home_net


  influxdb:
    image: influxdb:2.7
    container_name: influxdbmodule2
    restart: unless-stopped

    ports:
      - "8086:8086"

    volumes:
      - influxdb_data:/var/lib/influxdb2

    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin123
      DOCKER_INFLUXDB_INIT_ORG: openhab
      DOCKER_INFLUXDB_INIT_BUCKET: openhab
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: supersecrettoken

    networks:
      - smart_home_net


  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafanamodule2
    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      - influxdb

    networks:
      - smart_home_net


  integration_test_runner:
    build:
      context: .
      dockerfile: tests/Dockerfile

    container_name: integration_test_runnermodule2

    depends_on:
      - mosquitto
      - influxdb
      - sensor_simulator
      - edge_ai

    environment:
      MQTT_HOST: mosquitto
      PYTHONPATH: /app

    networks:
      - smart_home_net

    command: ["pytest", "-q", "tests/integration"]


networks:
  smart_home_net:
    driver: bridge

volumes:
  influxdb_data:
