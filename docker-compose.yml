services:

  openhab:
    image: openhab/openhab:latest
    container_name: openhabmodule2
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - ./openhab/conf:/openhab/conf
      - ./openhab/userdata:/openhab/userdata
      - ./openhab/addons:/openhab/addons

    environment:
      USER_ID: "1000"
      GROUP_ID: "1000"

    depends_on:
      - influxdb
      - mosquitto

    networks:
      - smart_home_net

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5


  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquittomodule2
    restart: unless-stopped

    ports:
      - "1883:1883"

    networks:
      - smart_home_net

    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3


  edge_ai:
    build: ./edge_ai
    container_name: edge_aimodule2
    restart: unless-stopped

    depends_on:
      - mosquitto

    networks:
      - smart_home_net


  sensor_simulator:
    build: ./sensor_simulator
    container_name: sensor_simulatormodule2
    restart: unless-stopped

    depends_on:
      - mosquitto

    networks:
      - smart_home_net


  influxdb:
    image: influxdb:2.7
    container_name: influxdbmodule2
    restart: unless-stopped

    ports:
      - "8086:8086"

    volumes:
      - influxdb_data:/var/lib/influxdb2

    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin123
      DOCKER_INFLUXDB_INIT_ORG: openhab
      DOCKER_INFLUXDB_INIT_BUCKET: openhab
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: supersecrettoken

    networks:
      - smart_home_net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 0"]
      interval: 20s
      timeout: 10s
      retries: 10


  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafanamodule2
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning

    depends_on:
      - influxdb

    networks:
      - smart_home_net


  backup:
    image: alpine
    container_name: backupmodule2

    volumes:
      - ./backups:/backups
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock

    working_dir: /app

    entrypoint: >
      sh -c "while true; do
        sleep 3600;
        ./backup.sh;
      done"

    restart: unless-stopped


networks:
  smart_home_net:
    driver: bridge

volumes:
  influxdb_data:
